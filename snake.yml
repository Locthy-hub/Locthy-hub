name: Generate Snake

on:
  schedule:
    - cron: "0 3 * * *"   # roda todo dia às 3h da manhã (UTC)
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate-snake:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation (paleta Kuromi)
        uses: Platane/snk@v3
        with:
          github_user_name: Locthy-hub
          outputs: |
            dist/snake.svg?color_snake=%23D8B4FE&color_dots=%23F8BBD9,%23D8B4FE,%23BDEBFF,%239333EA,%236B21A8
            dist/snake-dark.svg?color_snake=%23F8BBD9&color_dots=%23121212,%236B21A8,%239333EA,%23D8B4FE,%23F8BBD9

      - name: Push output to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
